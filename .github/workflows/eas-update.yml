# ──────────────────────────────────────────────────────────────
# EAS OTA Update — pushes a JS-only update to the production channel.
#
# Triggered:
#  • Manually via "workflow_dispatch" (with an optional message)
#  • On push to main when ONLY JS/TS/JSON/asset files changed
#    (see path filters below).
#
# Required repository secret:
#   EXPO_TOKEN — an Expo access token with publish permission.
# ──────────────────────────────────────────────────────────────
name: EAS Update (OTA)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "EAS channel to publish to"
        required: true
        type: choice
        options:
          - production
          - preview
          - development
        default: production
      message:
        description: "Update message shown in EAS dashboard"
        required: false
        default: "OTA update"
  push:
    branches: [main]
    paths:
      - "thesptoapp-v2-main/app/**"
      - "thesptoapp-v2-main/components/**"
      - "thesptoapp-v2-main/hooks/**"
      - "thesptoapp-v2-main/lib/**"
      - "thesptoapp-v2-main/constants/**"
      - "thesptoapp-v2-main/data/**"
      - "thesptoapp-v2-main/locales/**"
      - "thesptoapp-v2-main/assets/**"

defaults:
  run:
    working-directory: thesptoapp-v2-main

# Only one OTA publish at a time — later pushes cancel earlier queued ones.
concurrency:
  group: ota-update
  cancel-in-progress: true

jobs:
  ota-update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: thesptoapp-v2-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Publish update
        run: eas update --channel "${{ github.event.inputs.channel || 'production' }}" --message "${{ github.event.inputs.message || 'OTA update' }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
